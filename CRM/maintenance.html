<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="https://skippr.us/logo1.png">
  <title>Skippr CRM - Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0A0A0A;
      color: #FAFAFA;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { width: 120px; margin-bottom: 2.5rem; opacity: 0.9; }
    h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: clamp(2rem, 5vw, 3.5rem); color: #C9A84C; letter-spacing: 0.04em; margin-bottom: 1rem; }
    p { font-weight: 300; font-size: 1.1rem; color: #999; max-width: 440px; line-height: 1.7; }
    .divider { width: 60px; height: 1px; background: #C9A84C; margin: 2rem auto; opacity: 0.4; }
  </style>
</head>
<body>
  <img src="https://skippr.us/logo1.png" alt="Skippr" class="logo">
  <h1>CRM Temporarily Offline</h1>
  <p>The dashboard is undergoing maintenance. We'll be back shortly.</p>
  <div class="divider"></div>
</body>
</html>
