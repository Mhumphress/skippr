<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="/logo1.png">
  <title>Skippr - We'll Be Right Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --black: #0A0A0A;
      --white: #FAFAFA;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--black);
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { width: 120px; margin-bottom: 2.5rem; opacity: 0.9; }
    h1 {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--gold);
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }
    p { font-weight: 300; font-size: 1.1rem; color: #999; max-width: 440px; line-height: 1.7; margin-bottom: 0.5rem; }
    .divider { width: 60px; height: 1px; background: var(--gold); margin: 2rem auto; opacity: 0.4; }
    .contact a { color: var(--gold); text-decoration: none; }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <img src="/logo1.png" alt="Skippr" class="logo">
  <h1>We'll Be Right Back</h1>
  <p>We're making some updates to improve your experience. Please check back shortly.</p>
  <div class="divider"></div>
  <p class="contact">Questions? Reach us at <a href="mailto:info@skippr.us">info@skippr.us</a></p>
</body>
</html>
